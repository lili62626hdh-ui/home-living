name: Women13 CF – 4 group(s)

on:
  schedule:
    - cron: '0 6 * * *'  # Staggered daily run
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [CF.women_cat13_sub1, CF.women_cat13_sub2, CF.women_cat13_sub3, CF.women_cat13_sub4]
      max-parallel: 3
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run scraper – ${{ matrix.module }}
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m ${{ matrix.module }}.main

      - name: Job summary
        if: always()
        run: |
          echo "## ${{ matrix.module }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
